spring.application.name=Awpy
spring.datasource.url=jdbc:h2:mem:awpydb
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Apenas para desenvolvimento local: chave fixa (>=32 bytes p/ HS256) só pra tokens
# JWT sobreviverem aos restarts do devtools. NUNCA usar este valor fora do seu
# ambiente local — em produção isso precisa vir de variável de ambiente/secret manager.
awpy.jwt.secret=dev-only-awpy-secret-troque-isso-em-producao-1234567890
awpy.jwt.expiracao-minutos=120
